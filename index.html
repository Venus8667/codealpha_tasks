<!DOCTYPE html>
<html>
<head>
<title>Fitness Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Fitness Tracker</h1>

<input type="number" id="steps" placeholder="Enter Steps">

<input type="number" id="calories" placeholder="Calories Burned">

<input type="number" id="time" placeholder="Workout Time (minutes)">

<button onclick="saveData()">Save Activity</button>

<h3>Daily Progress</h3>

<p>Steps Progress</p>

<div class="progress">
<div class="bar" id="stepBar"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
